name: Build Mac

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-mac:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build Mac DMG
        run: npm run dist:mac -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Upload DMG to release
        run: gh release upload "v${{ steps.version.outputs.VERSION }}" release/*.dmg --repo maxifarias0715-ctrl/oculenx-ai --clobber
        env:
          GH_TOKEN: ${{ github.token }}
